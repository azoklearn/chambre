<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réservation confirmée — Student Flat Room Paris</title>
  <meta name="theme-color" content="#0c0a08" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='13' fill='%230c0a08'/%3E%3Ctext x='32' y='43' font-family='Georgia,serif' font-style='italic' font-size='27' fill='%23c79a62' text-anchor='middle'%3ESF%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Outfit:wght@300..600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .thanks {
      position: relative;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      overflow: hidden;
    }
    /* Halo laiton en fond */
    .thanks::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(60% 45% at 50% 8%, rgba(199, 154, 98, 0.12), transparent 70%),
        radial-gradient(50% 40% at 50% 100%, rgba(199, 154, 98, 0.05), transparent 70%);
      pointer-events: none;
    }
    .thanks-card { position: relative; max-width: 620px; }
    .thanks-kicker {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--brass);
      opacity: 0;
      animation: tFade 0.9s var(--ease-out) 0.55s forwards;
    }
    .check {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 1px solid var(--brass-deep);
      background: var(--brass-tint);
      display: grid;
      place-items: center;
      margin: 0 auto 30px;
      opacity: 0;
      transform: scale(0.8);
      animation: tPop 0.8s var(--ease-cine) 0.15s forwards;
    }
    .check svg { width: 36px; height: 36px; }
    .check path {
      stroke: var(--brass);
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: tDraw 0.7s var(--ease-out) 0.7s forwards;
    }
    .thanks-card h1 {
      margin-top: 18px;
      font-size: clamp(2.2rem, 6.5vw, 3.8rem);
      font-weight: 400;
      line-height: 1.05;
      text-wrap: balance;
      opacity: 0;
      animation: tUp 1s var(--ease-cine) 0.7s forwards;
    }
    .thanks-card h1 em { font-style: italic; color: var(--brass); }
    .thanks-card p {
      color: var(--ink-soft);
      margin: 20px auto 0;
      max-width: 46ch;
      opacity: 0;
      animation: tUp 1s var(--ease-cine) 0.9s forwards;
    }
    .thanks-actions {
      margin-top: 40px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: tUp 1s var(--ease-cine) 1.1s forwards;
    }
    .thanks-foot {
      position: absolute;
      bottom: 26px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ink-faint);
      opacity: 0;
      animation: tFade 1s ease 1.4s forwards;
    }
    @keyframes tFade { to { opacity: 1; } }
    @keyframes tPop { to { opacity: 1; transform: scale(1); } }
    @keyframes tDraw { to { stroke-dashoffset: 0; } }
    @keyframes tUp {
      from { opacity: 0; transform: translateY(26px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .thanks-kicker, .check, .thanks-card h1, .thanks-card p, .thanks-actions, .thanks-foot {
        opacity: 1 !important;
        transform: none !important;
        animation: none !important;
      }
      .check path { stroke-dashoffset: 0; animation: none; }
    }
  </style>
</head>
<body>
  <main class="thanks">
    <div class="thanks-card">
      <div class="check" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4 12.5 9.5 18 20 6.5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <p class="thanks-kicker">Student Flat Room — Paris</p>
      <h1 id="s-title">Réservation <em>confirmée.</em></h1>
      <p id="room-line">Merci, votre paiement a bien été reçu.</p>
      <p id="s-body">Nous vous contactons très vite pour finaliser votre entrée dans les lieux. Un reçu vous a été envoyé par e-mail.</p>
      <div class="thanks-actions">
        <a class="btn btn-primary" href="/" id="s-home">Retour à l'accueil</a>
        <a class="btn btn-whatsapp" href="https://wa.me/33672294751" target="_blank" rel="noopener" id="s-wa">Nous écrire sur WhatsApp</a>
      </div>
    </div>
    <p class="thanks-foot" id="s-foot">Gagny · Rosny-sous-Bois · Île-de-France</p>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    let lang = params.get('lang');
    if (lang !== 'en' && lang !== 'fr') lang = localStorage.getItem('lang') || 'fr';
    const room = params.get('room');
    const T = {
      fr: {
        title: 'Réservation <em>confirmée.</em>',
        roomLine: (r) => `Merci ! Votre réservation pour la « ${r} » est confirmée.`,
        thanks: 'Merci, votre paiement a bien été reçu.',
        body: 'Nous vous contactons très vite pour finaliser votre entrée dans les lieux. Un reçu vous a été envoyé par e-mail.',
        home: "Retour à l'accueil",
        wa: 'Nous écrire sur WhatsApp',
        docTitle: 'Réservation confirmée — Student Flat Room Paris',
      },
      en: {
        title: 'Booking <em>confirmed.</em>',
        roomLine: (r) => `Thank you! Your booking for “${r}” is confirmed.`,
        thanks: 'Thank you, your payment has been received.',
        body: "We'll contact you very soon to finalise your move-in. A receipt has been sent to your email.",
        home: 'Back to home',
        wa: 'Message us on WhatsApp',
        docTitle: 'Booking confirmed — Student Flat Room Paris',
      },
    }[lang];
    document.documentElement.lang = lang;
    document.title = T.docTitle;
    document.getElementById('s-title').innerHTML = T.title;
    document.getElementById('room-line').textContent = room ? T.roomLine(room) : T.thanks;
    document.getElementById('s-body').textContent = T.body;
    document.getElementById('s-home').textContent = T.home;
    document.getElementById('s-wa').textContent = T.wa;
  </script>
</body>
</html>
